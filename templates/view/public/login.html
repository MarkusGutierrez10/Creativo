<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creativo | Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/frontend/style/login.css">
</head>
<body>

    <div class="container">
        <div class="form-box login">
            <form action="#">
                <img src="/static/frontend/img/logo_negro.png" alt="Logo" style="height: 80px; margin-bottom: 10px;">
                <h1>Iniciar Sesión</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nombre de usuario" required>
                    <i class='bx bx-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Contraseña" required>
                    <i class='bx bx-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <img src="/static/frontend/img/logo_negro.png" alt="Logo" style="height: 80px; margin-bottom: 10px;">
                <h1>Registrarse</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nombre de usuario" required>
                    <i class='bx bx-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Correo electrónico" required>
                    <i class='bx bx-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Contraseña" required>
                    <i class='bx bx-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Crear Cuenta</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>¡Bienvenido de nuevo!</h1>
                <p>¿Ya tienes una cuenta registrada?</p>
                <button class="btn login-btn">Iniciar Sesión</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>¡Hola, Amigo!</h1>
                <p>¿Aún no eres parte de Creativo?</p>
                <button class="btn register-btn">Registrarse</button>
            </div>
        </div>
    </div>

    <script src="/static/backend/javascript/loginScript.js"></script>
</body>
</html>
